kind = "web"
previewPath = "/"
title = "Rayzan Mart"
version = "1.0.0"
id = "artifacts/rayzan-mart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22273

[services.development]
run = "pnpm --filter @workspace/rayzan-mart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rayzan-mart", "run", "build" ]
publicDir = "artifacts/rayzan-mart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22273"
BASE_PATH = "/"
